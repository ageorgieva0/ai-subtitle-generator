<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Subtitle Studio</title>
  <style>
    :root { --primary: #1a73e8; --bg: #f8f9fa; --card: #ffffff; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; padding: 40px; background: var(--bg); color: #202124; margin: 0; transition: direction 0.3s; }
    .container { max-width: 700px; background: var(--card); padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin: auto; }
    h1 { margin-top: 0; font-size: 28px; color: var(--primary); text-align: center; margin-bottom: 30px; }
    
    .preview-container {
      width: 100%; height: 280px;
      background: #000 url('https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=1000&q=80') center/cover no-repeat;
      border-radius: 12px; margin-bottom: 30px;
      position: relative; display: flex; justify-content: center; align-items: flex-end; overflow: hidden;
      border: 4px solid #eee;
    }
    .preview-text { margin-bottom: 25px; text-align: center; padding: 0 30px; font-weight: bold; line-height: 1.3; }

    .row { display: flex; gap: 20px; margin-bottom: 20px; }
    .col { flex: 1; }
    .field { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #5f6368; }
    input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; }
    input:focus, select:focus { border-color: var(--primary); }
    input[type="color"] { height: 48px; padding: 4px; cursor: pointer; }
    
    button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 17px; font-weight: bold; margin-top: 10px; transition: background 0.2s; }
    button:hover { background: #1557b0; }
    
    #progress-container { display: none; margin-top: 25px; }
    progress { width: 100%; height: 10px; border-radius: 5px; appearance: none; }
    progress::-webkit-progress-bar { background-color: #e8eaed; border-radius: 5px; }
    progress::-webkit-progress-value { background-color: var(--primary); border-radius: 5px; }
    #status { margin-top: 12px; font-size: 14px; text-align: center; color: #70757a; font-weight: 500; }
    #links { margin-top: 25px; }
    #links a { display: block; padding: 14px; background: #f1f3f4; color: var(--primary); text-decoration: none; border-radius: 8px; margin-bottom: 10px; text-align: center; font-weight: bold; border: 1px solid #dadce0; }
  </style>
</head>
<body>

<div class="container">
  <h1 id="ui-title">AI Subtitle Studio</h1>

  <div class="preview-container">
    <div id="previewText" class="preview-text">Preview Text</div>
  </div>

  <form id="form">
    <div class="field">
      <label id="lbl-file">Video File</label>
      <input type="file" id="file" accept="video/*" required />
    </div>

    <div class="row">
        <div class="col field">
            <label id="lbl-audio-lang">Audio (Speech)</label>
            <select id="audio_language"></select>
        </div>
        <div class="col field">
            <label id="lbl-sub-lang">Subtitles (Target)</label>
            <select id="subtitle_language"></select>
        </div>
    </div>

    <div class="row">
        <div class="col field">
            <label id="lbl-font">Font</label>
            <select id="font_name">
                <option value="Arial">Arial</option>
                <option value="Verdana">Verdana</option>
                <option value="Tahoma">Tahoma</option>
                <option value="Georgia">Georgia</option>
                <option value="Courier New">Courier New</option>
            </select>
        </div>
        <div class="col field">
            <label id="lbl-size">Size</label>
            <input type="number" id="font_size" value="28" min="10" max="72" />
        </div>
    </div>

    <div class="row">
        <div class="col field">
            <label id="lbl-text-clr">Text Color</label>
            <input type="color" id="text_color" value="#FFFFFF" />
        </div>
        <div class="col field">
            <label id="lbl-out-clr">Outline</label>
            <input type="color" id="outline_color" value="#000000" />
        </div>
    </div>

    <button type="submit" id="btn-submit">Generate Subtitles</button>
  </form>

  <div id="progress-container">
    <progress id="progressBar" value="0" max="100"></progress>
    <div id="status">Preparing...</div>
  </div>

  <div id="links"></div>
</div>

<script>
const whisperLanguages = {
    "en": "English", "bg": "Български", "es": "Español", "fr": "Français", "de": "Deutsch", "it": "Italiano", "pt": "Português", "ru": "Русский", "zh": "中文", "ja": "日本語", "hi": "हिन्दी", "ar": "العربية", "tr": "Türkçe", "pl": "Polski"
};

const audioSelect = document.getElementById("audio_language");
const subSelect = document.getElementById("subtitle_language");

function populate() {
    for (const [code, name] of Object.entries(whisperLanguages)) {
        const opt1 = new Option(name, code);
        const opt2 = new Option(name, code);
        audioSelect.add(opt1);
        subSelect.add(opt2);
        if (code === "en") opt1.selected = true;
        if (code === "bg") opt2.selected = true;
    }
}

function updatePreview() {
    const preview = document.getElementById("previewText");
    preview.style.fontFamily = document.getElementById("font_name").value;
    preview.style.fontSize = document.getElementById("font_size").value + "px";
    preview.style.color = document.getElementById("text_color").value;
    const oColor = document.getElementById("outline_color").value;
    preview.style.textShadow = `-1px -1px 0 ${oColor}, 1px -1px 0 ${oColor}, -1px 1px 0 ${oColor}, 1px 1px 0 ${oColor}`;
}

[document.getElementById("font_name"), document.getElementById("font_size"), 
 document.getElementById("text_color"), document.getElementById("outline_color")].forEach(el => {
    el.addEventListener("input", updatePreview);
});

populate();
updatePreview();

const form = document.getElementById("form");
form.onsubmit = (e) => {
  e.preventDefault();
  const formData = new FormData();
  formData.append("file", document.getElementById("file").files[0]);
  formData.append("audio_language", audioSelect.value);
  formData.append("subtitle_language", subSelect.value);
  formData.append("font_name", document.getElementById("font_name").value);
  formData.append("font_size", document.getElementById("font_size").value);
  formData.append("text_color", document.getElementById("text_color").value);
  formData.append("outline_color", document.getElementById("outline_color").value);

  document.getElementById("progress-container").style.display = "block";
  document.getElementById("links").innerHTML = "";
  
  const xhr = new XMLHttpRequest();
  xhr.upload.onprogress = (e) => {
    if (e.lengthComputable) {
      const pct = Math.round((e.loaded / e.total) * 100);
      document.getElementById("progressBar").value = pct;
      document.getElementById("status").textContent = `Uploading: ${pct}%`;
      if (pct === 100) document.getElementById("status").textContent = "AI Processing & Translating...";
    }
  };
  xhr.onload = () => {
    if (xhr.status === 200) {
      const resp = JSON.parse(xhr.responseText);
      document.getElementById("status").textContent = "Done!";
      document.getElementById("links").innerHTML = `
        <a href="${resp.download_video}">⬇ Download Subtitled Video</a>
        <a href="${resp.download_srt}">⬇ Download SRT File</a>
      `;
    }
  };
  xhr.open("POST", "/upload");
  xhr.send(formData);
};
</script>
</body>
</html>
